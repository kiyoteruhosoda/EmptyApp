# Azure DevOps CI/CD Pipeline for Flutter
# デジタル庁デザインシステム準拠 FlutterBase

trigger:
  branches:
    include:
      - main
      - master
      - develop
      - feature/*
      - fix/*
  paths:
    exclude:
      - '*.md'
      - docs/**
      - .claude/**

pr:
  branches:
    include:
      - main
      - master
      - develop

variables:
  - name: FLUTTER_VERSION
    value: '3.19.0'
  - name: JAVA_VERSION
    value: '17'
  - name: ANDROID_BUILD_TOOLS_VERSION
    value: '34.0.0'
  - name: ANDROID_COMPILE_SDK_VERSION
    value: '34'

stages:
  # ─── Stage: Build Android APK ───────────────────────────────────────
  - stage: Build_Android
    displayName: 'Build Android APK'
    jobs:
      - job: Android_Debug
        displayName: 'Android Debug Build'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: JavaToolInstaller@0
            displayName: 'Install Java $(JAVA_VERSION)'
            inputs:
              versionSpec: '$(JAVA_VERSION)'
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - script: |
              git clone https://github.com/flutter/flutter.git \
                --depth 1 \
                --branch stable \
                $HOME/flutter
              echo "##vso[task.prependpath]$HOME/flutter/bin"
            displayName: 'Install Flutter'

          - script: flutter pub get
            displayName: 'Install Dependencies'

          - script: flutter build apk --debug
            displayName: 'Build Android Debug APK'

          - task: CopyFiles@2
            displayName: 'Copy APK to Staging'
            inputs:
              sourceFolder: build/app/outputs/flutter-apk
              contents: '*.apk'
              targetFolder: $(Build.ArtifactStagingDirectory)/android

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Android Debug APK'
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/android
              artifactName: android-debug
