name: Build Signing APK

on:
  workflow_dispatch:

concurrency:
  group: signing-apk-build
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  start-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.FUNC_URL }}" ]        && MISSING="$MISSING FUNC_URL"
          [ -z "${{ secrets.FUNC_STOP_URL }}" ]   && MISSING="$MISSING FUNC_STOP_URL"
          [ -z "${{ secrets.FUNC_STATUS_URL }}" ] && MISSING="$MISSING FUNC_STATUS_URL"
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following required secrets are not set:$MISSING"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Stop any existing ACI Runner
        run: |
          echo "Stopping any previously running ACI runner..."
          curl -s -X POST "${{ secrets.FUNC_STOP_URL }}" || true
          sleep 5

      - name: Start ACI Runner
        run: |
          for ATTEMPT in 1 2 3 4; do
            echo "--- Start attempt $ATTEMPT ---"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${{ secrets.FUNC_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"github_repo\": \"${{ github.repository }}\"}" || true)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "Response: $BODY"
            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "ACI Runner started successfully."
              exit 0
            fi

            if [ "$ATTEMPT" -lt 4 ]; then
              WAIT=$((2 ** ATTEMPT))
              echo "Start failed (HTTP $HTTP_CODE). Retrying in ${WAIT}s..."
              sleep "$WAIT"
              echo "Stopping runner before retry..."
              curl -s -X POST "${{ secrets.FUNC_STOP_URL }}" || true
              sleep 5
            fi
          done

          echo "Failed to start ACI Runner after 4 attempts."
          exit 1

      - name: Wait and monitor ACI
        run: |
          STATUS_URL="${{ secrets.FUNC_STATUS_URL }}"

          for i in $(seq 1 20); do
            echo "--- Attempt $i ---"
            RESULT=$(curl -s "$STATUS_URL" || true)
            STATUS=$(echo $RESULT | jq -r '.status')
            LOGS=$(echo $RESULT | jq -r '.logs')

            echo "ACI Status: $STATUS"
            echo "--- ACI Logs ---"
            echo "$LOGS"

            if [ "$STATUS" = "Terminated" ]; then
              EXIT_CODE=$(echo $RESULT | jq -r '.exit_code')
              echo "ACI terminated with exit code: $EXIT_CODE"
              if [ "$EXIT_CODE" != "0" ]; then
                exit 1
              fi
            fi

            if echo "$LOGS" | grep -q "Listening for Jobs"; then
              echo "Runner is ready!"
              exit 0
            fi

            sleep 15
          done

          echo "Timeout waiting for runner"
          exit 1

  build:
    needs: start-runner
    runs-on: [self-hosted, android]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Android SDK permissions
        run: |
          if [ -n "$ANDROID_SDK_ROOT" ]; then
            sudo chmod -R a+rwx "$ANDROID_SDK_ROOT" || true
          elif [ -n "$ANDROID_HOME" ]; then
            sudo chmod -R a+rwx "$ANDROID_HOME" || true
          fi

      - name: Write adi-registration snippet
        env:
          ADI_REGISTRATION_SNIPPET: ${{ secrets.ADI_REGISTRATION_SNIPPET }}
        run: |
          if [ -z "$ADI_REGISTRATION_SNIPPET" ]; then
            echo "ERROR: ADI_REGISTRATION_SNIPPET secret is not set" >&2
            exit 1
          fi
          printf '%s\n' "$ADI_REGISTRATION_SNIPPET" > app/src/main/assets/adi-registration.properties

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > key.properties

      - name: Build release APK
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: signing-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  stop-runner:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Stop ACI
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.FUNC_STOP_URL }}" || true)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
